<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;

  background:
    linear-gradient(rgba(20,20,20,0.7), rgba(20,20,20,0.7)),
    url("https://images.unsplash.com/photo-1495195134817-aeb325a55b65");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}


 h1 {
  flex: 1;
  text-align: center;
  color: #fff;
  font-size: 36px;
  letter-spacing: 2px;
  text-shadow: 0 4px 15px rgba(0,0,0,0.6);
  text-shadow: orange;
}


h2 {
  grid-column: 1 / -1;
  margin-top: 30px;
  color: white;
  border-bottom: 2px solid #ddd;
  padding-bottom: 6px;
}



 #searchBox {
  width: 100%;
  max-width: 420px;
  padding: 14px 18px;
  margin: 25px auto;
  display: block;
  font-size: 16px;
  border-radius: 30px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.95);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}


  #ingredientBox {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 15px;
  }

 .ingredient-card {
  background: rgba(255,255,255,0.95);
  padding: 14px;
  border-radius: 18px;
  text-align: center;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border 0.25s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

.ingredient-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 15px 30px rgba(0,0,0,0.18);
}


  .ingredient-card img {
    width: 70px;
    height: 70px;
    object-fit: contain;
  }

  .ingredient-card span {
    display: block;
    margin-top: 6px;
    font-weight: bold;
    font-size: 14px;
  }

  .ingredient-card small {
    font-size: 12px;
    color: #555;
  }

  .ingredient-card input {
    display: none;
  }

 .ingredient-card:has(input:checked) {
  border-color: #e67e22;
  background: linear-gradient(135deg, #fff3e0, #ffe0b2);
  box-shadow: 0 12px 30px rgba(230,126,34,0.35);
}


.actions {
  display: flex;
  flex-direction: row;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin: 30px 0;
  flex-wrap: nowrap;   /* <- important */
}

.actions button {
  width: 180px;        /* fixed width so they fit in one line */
  flex: 0 0 auto;      /* prevent shrinking to next line */
}

 button {
  padding: 14px 32px;
  font-size: 16px;
  background: linear-gradient(135deg, #e67e22, #d35400);
  color: white;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(211,84,0,0.4);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 35px rgba(211,84,0,0.6);
}


  button.secondary {
    background: #777;
  }
/* Fix main heading centering */
.page-header {
  position: relative;
  display: flex;
  align-items: center;
}

.page-header h1 {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 36px;
  letter-spacing: 2px;
  text-shadow: 0 4px 15px rgba(0,0,0,0.6);
}
button,
.ingredient-card:has(input:checked) {
  filter: saturate(1.1);
}

</style>

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBgezjCcznjGIgFajXC0MfCSX8_IRia28k",
    authDomain: "gharkachef-14dd4.firebaseapp.com",
    projectId: "gharkachef-14dd4",
    storageBucket: "gharkachef-14dd4.firebasestorage.app",
    messagingSenderId: "827981085762",
    appId: "1:827981085762:web:bb01f4f920f1de24aa41db"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let box;
  let selectedIngredients = new Set();

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "login2.html";
      return;
    }
    initPage();
  });

  function initPage() {
    box = document.getElementById("ingredientBox");

    document.getElementById("searchBox").addEventListener("input", e => {
      renderByCategory(e.target.value.toLowerCase());
    });

    renderByCategory();
  }

  function renderByCategory(filterText = "") {
    box.innerHTML = "";

    for (const [category, names] of Object.entries(categories)) {
      const items = ingredients.filter(i =>
        names.includes(i.name) &&
        i.name.toLowerCase().includes(filterText)
      );

      if (items.length === 0) continue;

      box.innerHTML += `<h2>${category}</h2>`;

      items.forEach(item => {
        const checked = selectedIngredients.has(item.name) ? "checked" : "";

        box.innerHTML += `
          <label class="ingredient-card">
            <input type="checkbox" value="${item.name}" ${checked}>
            <img src="${item.image}">
            <span>${item.name}</span>
            <small>${item.telugu}</small>
          </label>
        `;
      });
    }

    attachEvents();
  }

  function attachEvents() {
    document.querySelectorAll("input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", e => {
        e.target.checked
          ? selectedIngredients.add(e.target.value)
          : selectedIngredients.delete(e.target.value);
      });
    });
  }

  function resetSelection() {
    selectedIngredients.clear();
    localStorage.removeItem("selectedIngredients");
    renderByCategory();
  }

  function goToRecipes() {
    if (selectedIngredients.size === 0) {
      alert("Please select at least one ingredient");
      return;
    }

    localStorage.setItem(
  "selectedIngredients",
  JSON.stringify([...selectedIngredients])
);


    window.location.href = "recipe.html";
  }

  window.resetSelection = resetSelection;
  window.goToRecipes = goToRecipes;
</script>
