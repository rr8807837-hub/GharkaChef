 <style>
body {

  background-attachment: fixed;

  header {
    position: fixed;

    left: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
  }

    height: 80px;
  }

 #recipeBox {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(2,1fr); /* single column */
  gap: 20px;
}


  .recipe-card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border-radius: 18px;
    padding: 22px;

    cursor: pointer;
    transition: transform .2s ease;
  }

  .recipe-card:hover {
    transform: translateY(-4px);
  }

  .recipe-title {
    margin: 0;
    font-size: 23px;
    color: #fff3e0;
  }

  .recipe-details {
    margin-top: 19px;
    font-size: 21px;
    line-height: 1.8;
    display: none;
  }


  .nav-btn {
    background: #fff;
    color: #ff6a00;
    border: none;
    padding: 18px 34px;
    border-radius: 30px;
    font-weight: 600;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 15px rgba(0,0,0,0.25);
  }
.bottom-bar {
  position: fixed;
  bottom: 15px;
  left: 15px;
  right: 15px;
  display: flex;
  justify-content: space-between;
  z-index: 10;
}




.review-msg {
  max-width: 1000px;
  margin: 120px auto 80px;
  padding: 14px 18px;
  border-radius: 12px;
  text-align: center;

}

.category-grid {
  max-width: 1000px;
  margin: 20px auto;
  display: grid;
  grid-template-columns: repeat(2 ,1fr);
  gap: 20px;
}
#categoryBox {
  grid-template-columns: 1fr;

.section-divider {
  max-width: 1000px;

.section {
  max-width: 1000px;

#categoryBox .recipe-title {

let activeCategory = null;

function showCategory(cat) {
  const box = document.getElementById("categoryBox");

  // If same category clicked again → hide
  if (activeCategory === cat) {
    box.innerHTML = "";
    activeCategory = null;
    return;
  }

  activeCategory = cat;

  const names = categories[cat] || [];
  const list = window.recipes.filter(r => names.includes(r["Recipe name"]));
  renderCategoryRecipes(list);
}


function renderCategoryRecipes(list) {
  const box = document.getElementById("categoryBox");
  box.innerHTML = "";

  if (!list.length) {
    box.innerHTML = "<p style='color:white;text-align:center'>No recipes in this category.</p>";
    return;
  }

  list.forEach(r => {
    const card = document.createElement("div");
    card.className = "recipe-card";

    const title = document.createElement("h3");
    title.className = "recipe-title";
    title.textContent = r["Recipe name"];

    const meta = document.createElement("div");
    meta.style.color = "#000";
    meta.style.marginTop = "6px";
    meta.textContent = `${r.ingredients.length} ingredients • ${r.steps.length} steps`;

    const details = document.createElement("div");
    details.className = "recipe-details";
    details.innerHTML = `
      <strong>Ingredients:</strong>
      <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
      <strong>Steps:</strong>
      <ol>${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
    `;

    title.onclick = () => {
      details.style.display = details.style.display === "block" ? "none" : "block";
    };

    card.appendChild(title);
    card.appendChild(meta);
    card.appendChild(details);
    box.appendChild(card);
  });
}
