<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GharKaChef</title>
 <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                  url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
      background-size: cover;
      background-position: center;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      width: 380px;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.35);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 600;
      color: #d35400;
    }

    .tagline {
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    label {
      font-size: 13px;
      color: #444;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      margin-bottom: 18px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #d35400;
      box-shadow: 0 0 0 2px rgba(211,84,0,0.2);
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #d35400, #e67e22);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(211,84,0,0.45);
    }

    .footer-text {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #888;
    }

    .footer-text span {
      color: #d35400;
      font-weight: 500;
    }
    .top-logo {
  position: fixed;
  top: 20px;
  left: 20px;
    border-color: orange;
}

  </style>
</head>

<body>
<div class="top-logo"><img height="70px" width="120px"    
src="images/gharkacheflogo.png"> </div>

  <div class="login-container">
    <div class="logo">🍳 GharKaChef</div>
    <div class="tagline">Cook delicious meals with what’s in your kitchen</div>

    <label>Chef Name</label>
    <input style="border:solid;" type="text" id="name" placeholder="Enter your name" />

    <label>Email</label>
    <input style="border: solid;" type="email" id="email" placeholder="Enter your email" />

    <button onclick="login()">Start Cooking</button>

    <div class="footer-text">Your personal <span>Home Recipe Assistant</span></div>
  </div>

 <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyBgezjCcznjGIgFajXC0MfCSX8_IRia28k",
  authDomain: "gharkachef-14dd4.firebaseapp.com",
  projectId: "gharkachef-14dd4",
  storageBucket: "gharkachef-14dd4.firebasestorage.app",
  messagingSenderId: "827981085762",
  appId: "1:827981085762:web:bb01f4f920f1de24aa41db",
  measurementId: "G-44P8CB6CDX"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.login = async function () {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    if (name === '' || email === '') {
      alert('Please fill all details');
      return;
    }

    // Use a simple default password pattern for now
    const password = "gharkachef123";

    try {
      // Try login first
      const userCred = await signInWithEmailAndPassword(auth, email, password);
      const user = userCred.user;

      // Update / ensure user data in Firestore
      await setDoc(doc(db, "users", user.uid), {
        name: name,
        email: email,
        lastLogin: new Date()
      }, { merge: true });

      window.location.href = "index.html";

    } catch (err) {
      // If user not found, create new account
      if (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential") {
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        await setDoc(doc(db, "users", user.uid), {
          name: name,
          email: email,
          createdAt: new Date()
        });

        window.location.href = "index.html";
      } else {
        alert(err.message);
      }
    }
  };
</script>


</body>
</html>
